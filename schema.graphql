type Token {
  id: ID! # `${chainId}-${tokenAddress}`
  chainId: Int!
  symbol: String! @index
  name: String!
  decimals: BigInt!
  isIsolationMode: Boolean!
  marketId: BigInt! @index
  tradeVolume: BigDecimal!
  tradeVolumeUSD: BigDecimal!
  transactionCount: BigInt!
  ammTradeLiquidity: BigDecimal!
  supplyLiquidity: BigDecimal!
  supplyLiquidityUSD: BigDecimal!
  borrowLiquidity: BigDecimal!
  borrowLiquidityUSD: BigDecimal!
  derivedETH: BigDecimal
  pairBase: [AmmPair!]! @derivedFrom(field: "token0")
  pairQuote: [AmmPair!]! @derivedFrom(field: "token1")
  # NOTE: subgraph had singular one-to-one derived fields interestRate/interestIndex/
  # riskInfo/totalPar here. Envio only supports list-valued @derivedFrom, so these are
  # dropped — each child entity shares this token's id (`${chainId}-${tokenAddress}`),
  # so fetch them directly by id instead.
  settings: [TokenSetting!]! @derivedFrom(field: "token")
}

type TokenMarketIdReverseLookup {
  id: ID! # `${chainId}-${marketId}`
