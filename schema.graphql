### Dolomite protocol — HyperIndex schema, ported 1:1 from dolomite-subgraph/schema.graphql.
### Conventions (same as the dolomite-liquidator-hyperindex port):
###  - No @entity decorator (Envio implicit); id is always first.
###  - All ids are namespaced with `${chainId}-` (single multichain indexer; addresses
###    repeat across chains). Addresses arrive lowercased via address_format: lowercase.
###  - Non-derived entity-reference arrays (e.g. `[Token!]!` without @derivedFrom) are not
###    supported by Envio, so they are stored as `[String!]!` (arrays of the entity ids).
###  - @derivedFrom is kept ONLY where the child's backing field is a singular entity
###    reference. The subgraph's User.{transfers,trades,liquidations,vaporizations} derive
###    from the ARRAY field `effectiveUsers`, which Envio can't do — those reverse lookups
###    are dropped (query via the child entities' effectiveUsers id arrays instead).
###  - status/type fields stay String! (the subgraph uses documented string enums).
###  - @index added on common filter fields (id and @derivedFrom fields are auto-indexed).

