# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: dolomite
description: Dolomite protocol indexer (1:1 port of the full Dolomite subgraph)
address_format: lowercase

field_selection:
  transaction_fields:
    - hash
    - from

contracts:
  # DolomiteMargin = subgraph MarginCore + MarginAdmin data sources (same address, one ABI).
  - name: DolomiteMargin
    abi_file_path: ./abis/dolomite-margin.events.json
    events:
      # MarginCore
      - event: "LogIndexUpdate(uint256 indexed market, (uint96 borrow,uint96 supply,uint32 lastUpdate) index)"
        name: LogIndexUpdateOld
      - event: "LogIndexUpdate(uint256 indexed market, (uint112 borrow,uint112 supply,uint32 lastUpdate) index)"
        name: LogIndexUpdateNew
      - event: LogOraclePrice
      - event: LogDeposit
      - event: LogWithdraw
      - event: LogTransfer
      - event: LogBuy
      - event: LogSell
      - event: LogTrade
      - event: LogLiquidate
      - event: LogVaporize
      - event: LogCall
      # MarginAdmin
      - event: LogAddMarket
      - event: LogRemoveMarket
      - event: LogSetIsClosing
      - event: LogSetPriceOracle
      - event: LogSetInterestSetter
      - event: LogSetMarginPremium
      - event: LogSetSpreadPremium
      - event: LogSetLiquidationSpreadPremium
      - event: LogSetMaxWei
      - event: LogSetMaxSupplyWei
      - event: LogSetMaxBorrowWei
      - event: LogSetEarningsRateOverride
      - event: LogSetMarginRatio
      - event: LogSetLiquidationSpread
      - event: LogSetEarningsRate
      - event: LogSetMinBorrowedValue
      - event: LogSetAccountMaxNumberOfMarketsWithBalances
      - event: LogSetOracleSentinel
      - event: LogSetCallbackGasLimit
      - event: LogSetDefaultAccountRiskOverrideSetter
      - event: LogSetAccountRiskOverrideSetter
      - event: LogSetGlobalOperator
      - event: LogSetAutoTraderIsSpecial

  - name: DolomiteMarginExpiry
    abi_file_path: ./abis/dolomite-margin-expiry.events.json
    events:
      - event: ExpirySet
      - event: LogExpiryRampTimeSet

  - name: EventEmitterRegistry
    abi_file_path: ./abis/event-emitter-registry.events.json
    events:
      - event: AsyncDepositCreated
      - event: AsyncDepositOutputAmountUpdated
      - event: AsyncDepositExecuted
      - event: AsyncDepositFailed
      - event: AsyncDepositCancelled
      - event: AsyncDepositCancelledFailed
      - event: AsyncWithdrawalCreated
      - event: AsyncWithdrawalOutputAmountUpdated
      - event: AsyncWithdrawalExecuted
      - event: AsyncWithdrawalFailed
      - event: AsyncWithdrawalCancelled
      - event: RewardClaimed
      - event: DistributorRegistered
      - event: DolomiteSettingChanged
      - event: UserSettingChanged
      - event: TokenSettingChanged

  - name: ModularLinearStepFunctionInterestSetter
    abi_file_path: ./abis/modular-linear-step-function-interest-setter.events.json
    events:
      - event: SettingsChanged

  - name: BorrowPositionProxy
    abi_file_path: ./abis/borrow-position-proxy.events.json
    events:
      - event: BorrowPositionOpen

  - name: GenericTraderProxy
    abi_file_path: ./abis/generic-trader-proxy.events.json
    events:
      - event: ZapExecuted

  - name: DolomiteAmmFactory
    abi_file_path: ./abis/dolomite-amm-factory.events.json
    events:
      - event: PairCreated

  - name: DolomiteAmmRouter
    abi_file_path: ./abis/dolomite-amm-router-proxy.events.json
    events:
      - event: MarginPositionOpen
      - event: MarginPositionClose

  - name: LiquidityMiningClaimer
    abi_file_path: ./abis/liquidity-mining-claimer.events.json
    events:
      - event: Claimed

  - name: LiquidityMiningVester
    abi_file_path: ./abis/liquidity-mining-vester.events.json
    events:
      - event: "VestingPositionCreated((address creator,uint256 id,uint256 startTime,uint256 duration,uint256 amount) vestingPosition)"
        name: VestingPositionCreatedOld
      - event: "VestingPositionCreated((address creator,uint256 id,uint256 startTime,uint256 duration,uint256 oTokenAmount,uint256 pairAmount) vestingPosition)"
        name: VestingPositionCreatedNew
      - event: "VestingStarted(address indexed owner, uint256 duration, uint256 amount, uint256 vestingId)"
        name: VestingStartedOld
      - event: "VestingStarted(address indexed owner, uint256 duration, uint256 oTokenAmount, uint256 pairAmount, uint256 vestingId)"
        name: VestingStartedNew
      - event: PositionDurationExtended
      - event: Transfer
      - event: PositionClosed
      - event: PositionForceClosed
      - event: EmergencyWithdraw
      - event: LevelRequestInitiated
      - event: LevelRequestFinalized

  # --- Dynamic (factory-registered) contracts: no fixed address ---
  - name: AmmPair
    abi_file_path: ./abis/amm-pair.events.json
    events:
      - event: Mint
      - event: Burn
      - event: Swap
      - event: Transfer
      - event: Sync

  - name: IsolationModeFactory
    abi_file_path: ./abis/isolation-mode-vault-factory.events.json
    events:
      - event: VaultCreated

